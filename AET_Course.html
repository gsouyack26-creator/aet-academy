<!DOCTYPE html>

<head>

<title>AET Course - Automation Engineering Technology (19 Modules)</title>
<style>
:root{--bg:#1a1a2e;--card:#16213e;--accent:#0f3460;--hi:#e94560;--text:#eee;--text2:#aab;--ok:#27ae60;--warn:#f39c12;--fail:#e74c3c;--r:10px}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}
#sb{width:290px;min-width:290px;background:var(--card);border-right:1px solid #333;overflow-y:auto;padding:0}
#sb-head{padding:1rem;border-bottom:1px solid #333;position:sticky;top:0;background:var(--card);z-index:2}
#sb-head h1{font-size:1rem;color:var(--hi);margin-bottom:.5rem}
#search{width:100%;padding:.4rem .6rem;border-radius:5px;border:1px solid #444;background:#111;color:#eee;font-size:.82rem}
#nav{padding:.5rem 0}.ni{padding:.5rem 1rem;cursor:pointer;border-left:3px solid transparent;font-size:.82rem;transition:all .15s;display:flex;align-items:center;gap:.4rem}
.ni:hover{background:var(--accent);border-left-color:var(--hi)}.ni.active{background:var(--accent);border-left-color:var(--hi);font-weight:600}
.ni .mn{color:var(--hi);font-weight:700;min-width:1.4rem}.ni .badge{margin-left:auto;font-size:.7rem;padding:1px 5px;border-radius:8px;background:var(--ok);color:#fff}
#main{flex:1;overflow-y:auto;padding:2rem 3rem}
.mh{margin-bottom:1.5rem}.mh h2{font-size:1.7rem;color:var(--hi);margin-bottom:.2rem}.mh .sub{color:var(--text2);font-size:.85rem}
.obj{background:var(--accent);border-radius:var(--r);padding:1rem 1.3rem;margin-bottom:1.5rem}.obj h3{color:var(--warn);margin-bottom:.5rem;font-size:.95rem}.obj li{margin:.3rem 0 .3rem 1.2rem;font-size:.88rem;line-height:1.5}
.sec{margin-bottom:1.8rem}.sec h3{color:var(--hi);font-size:1.1rem;margin-bottom:.6rem;border-bottom:1px solid #333;padding-bottom:.2rem}
.sec .bd{font-size:.9rem;line-height:1.7}.sec .bd b{color:#fff}.sec .bd pre{background:#111;padding:.7rem;border-radius:6px;overflow-x:auto;font-size:.8rem;margin:.5rem 0}.sec .bd code{background:#222;padding:2px 4px;border-radius:3px;font-size:.83rem}
.lab{background:#0a2a1a;border:1px solid var(--ok);border-radius:var(--r);padding:1rem 1.3rem;margin-bottom:1.5rem}.lab h3{color:var(--ok);margin-bottom:.2rem}.lab .tool{font-size:.8rem;color:var(--text2);margin-bottom:.5rem}.lab ol{margin-left:1.2rem;font-size:.88rem;line-height:1.7}
.qz{background:#1a1020;border:1px solid #555;border-radius:var(--r);padding:1rem 1.3rem;margin-bottom:1.5rem}.qz h3{color:var(--warn);margin-bottom:.8rem}
.qb{margin-bottom:1rem;padding-bottom:.8rem;border-bottom:1px solid #333}.qb:last-child{border-bottom:none}
.qt{font-size:.9rem;font-weight:600;margin-bottom:.4rem}.qo label{display:block;padding:.25rem .5rem;margin:.15rem 0;border-radius:4px;cursor:pointer;font-size:.85rem;transition:background .15s}.qo label:hover{background:#333}.qo input{margin-right:.4rem}
.qf{margin-top:.3rem;padding:.4rem .6rem;border-radius:5px;font-size:.83rem;display:none}.qf.c{display:block;background:#1a3a1a;color:var(--ok)}.qf.w{display:block;background:#3a1a1a;color:var(--fail)}
.res{margin-bottom:1.5rem}.res h3{color:var(--text2);margin-bottom:.4rem;font-size:.95rem}.res a{display:block;color:#5dade2;font-size:.85rem;margin:.2rem 0;text-decoration:none}.res a:hover{text-decoration:underline}
.pbar{position:fixed;top:0;left:290px;right:0;height:4px;background:#111;z-index:99}.pfill{height:100%;background:var(--hi);transition:width .3s}
.next-btn{background:var(--hi);color:#fff;border:none;padding:.7rem 1.8rem;border-radius:6px;cursor:pointer;font-size:.95rem;margin:1.5rem 0}
.next-btn:hover{opacity:.85}
#glossary{display:none;padding:2rem 3rem;overflow-y:auto}
#glossary h2{color:var(--hi);margin-bottom:1rem}
#glossary .gi{padding:.4rem 0;border-bottom:1px solid #222;font-size:.88rem}
#glossary .gi b{color:var(--warn)}
.tab-bar{display:flex;gap:0;border-bottom:1px solid #444;margin-bottom:1rem;position:sticky;top:0;background:var(--bg);z-index:5;padding-top:.5rem}
.tab{padding:.5rem 1.2rem;cursor:pointer;color:var(--text2);font-size:.9rem;border-bottom:2px solid transparent}.tab.active{color:var(--hi);border-bottom-color:var(--hi)}
.score-bar{margin:1.5rem 0;padding:1rem;background:var(--accent);border-radius:var(--r);font-size:.9rem}
.score-bar b{color:var(--ok)}
@media(max-width:900px){#sb{width:240px;min-width:240px}#main,#glossary{padding:1.2rem}}
@media(max-width:600px){body{flex-direction:column}#sb{width:100%;min-width:unset;max-height:180px;border-right:none;border-bottom:1px solid #333}#main,#glossary{padding:1rem}.pbar{left:0}}
.qlink{flex:1;min-width:80px;background:var(--accent);color:var(--text);border:1px solid #345;padding:.35rem;border-radius:5px;cursor:pointer;font-size:.72rem}.qlink:hover{background:var(--hi);color:#fff}
.sim{background:#0a1a2a;border:1px solid #5dade2;border-radius:var(--r);padding:1rem 1.3rem;margin-bottom:1.5rem}
.sim h3{color:#5dade2;margin-bottom:.3rem}.sim .desc{font-size:.83rem;color:var(--text2);margin-bottom:.7rem;line-height:1.5}
.sim label{display:block;font-size:.83rem;margin:.4rem 0 .15rem;color:var(--text2)}
.sim input,.sim select{width:100%;max-width:220px;padding:.35rem .5rem;border-radius:5px;border:1px solid #444;background:#111;color:#eee;font-size:.85rem}
.sim .row{display:flex;gap:1.2rem;flex-wrap:wrap;margin-bottom:.5rem}.sim .row>div{flex:1;min-width:150px}
.sim .out{margin-top:.8rem;padding:.7rem 1rem;background:#111;border-radius:6px;font-size:.9rem;line-height:1.6;border-left:3px solid #5dade2}
.sim .out b{color:#5dade2}.sim .big{font-size:1.3rem;color:var(--ok);font-weight:700}
.sim .btn{background:#5dade2;color:#03263d;border:none;padding:.4rem 1rem;border-radius:5px;cursor:pointer;font-weight:600;font-size:.85rem;margin-top:.4rem}
.sim .lamp{display:inline-block;width:14px;height:14px;border-radius:50%;background:#333;border:1px solid #666;vertical-align:middle}.sim .lamp.on{background:var(--ok);box-shadow:0 0 6px var(--ok)}
.exam-hd{background:var(--accent);border-radius:var(--r);padding:1.2rem 1.5rem;margin-bottom:1.5rem}.exam-hd h2{color:var(--hi)}.exam-hd p{font-size:.85rem;color:var(--text2);margin-top:.4rem;line-height:1.5}
.exresult{padding:1.2rem 1.5rem;border-radius:var(--r);margin-bottom:1.5rem;font-size:1rem}.exresult.pass{background:#0a2a1a;border:1px solid var(--ok)}.exresult.failg{background:#2a0a0a;border:1px solid var(--fail)}
@media print{
  #sb,.pbar,.tab-bar,.next-btn,.qz,.qo,.sim .btn,#printbtn,.res a{display:none!important}
  body{display:block;height:auto;overflow:visible;background:#fff;color:#000}
  #main,#glossary{display:block!important;padding:0;overflow:visible}
  .obj,.sec,.lab,.sim{background:#fff!important;border:1px solid #ccc!important;color:#000;page-break-inside:avoid}
  .mh h2,.sec h3,.obj h3,.lab h3,.sim h3{color:#000!important}
  .sec .bd b,.sec .bd pre,.sec .bd code{color:#000;background:#f0f0f0}
  a{color:#000;text-decoration:none}
  .printall .mh{page-break-before:always}
}
</style>

<script>
const M=[{"id": 0, "title": "Introduction to Automation Engineering Technology", "objectives": ["Define AET and its role in modern manufacturing/logistics", "Identify the 10 core technical domains of automation", "Describe how automated systems integrate sensors, controllers, actuators, and networks", "Map AET career paths and credentials (AAS, BSET, certs)"], "sections": [{"h": "What Is AET?", "body": "Automation Engineering Technology is the applied discipline of designing, installing, programming, operating, and maintaining automated industrial systems. It combines electrical/electronics, mechanical, computer-control, and systems-integration skills.<br><br>At Amazon fulfillment centers (like ACY1), AET skills are used daily by RME technicians maintaining conveyors, sorters, drives, PLCs, robotics cells, and safety systems."}, {"h": "The Automation Pyramid", "body": "Industrial automation is modeled as a hierarchy:<br><b>Level 0</b> - Physical Process (motors, actuators, sensors)<br><b>Level 1</b> - Direct Control (PLCs, safety controllers)<br><b>Level 2</b> - Supervisory (HMI, SCADA)<br><b>Level 3</b> - Manufacturing Operations (MES, historians)<br><b>Level 4</b> - Enterprise (ERP, business systems)<br><br>AET technicians primarily work at Levels 0-2."}, {"h": "The 10 Core Domains", "body": "<ol><li>Electrical Fundamentals & Motor-Control Wiring</li><li>PLCs (IEC 61131-3)</li><li>HMI / SCADA</li><li>Industrial Networks & Fieldbus</li><li>Motors, VFDs & Drives</li><li>Sensors & Instrumentation</li><li>Fluid Power (Pneumatics & Hydraulics)</li><li>Robotics & Motion Control</li><li>Process Control & PID</li><li>Machine Safety / Functional Safety</li></ol>"}, {"h": "Career Paths", "body": "<b>Credentials:</b> AAS (2yr) - entry; Stackable certs (15-30 cr); BSET (4yr) - advanced.<br><b>Certifications:</b> ISA CCST, SACA C-101/C-201, FANUC Robot cert, Rockwell/Siemens vendor certs, NCCER Instrumentation.<br><b>At Amazon RME:</b> L4 Automation Engineer, Mechatronics & Robotics Technician, Senior AE (L5+)."}], "lab": {"title": "Explore the Automation Pyramid", "tool": "Paper/whiteboard", "steps": ["Draw the 5-level automation pyramid", "List 2-3 real devices from your site per level", "Star areas where you want to grow"]}, "quiz": [{"q": "What does AET stand for?", "options": ["Automated Electrical Testing", "Automation Engineering Technology", "Advanced Electronics Troubleshooting", "Applied Energy Transmission"], "answer": 1, "explain": "AET = Automation Engineering Technology."}, {"q": "At which levels do AET technicians primarily work?", "options": ["Levels 3-4", "Levels 0-2 (Process/Control/Supervisory)", "Level 4 only", "Level 5 (Cloud)"], "answer": 1, "explain": "AET techs work at Levels 0-2."}, {"q": "Most common 2-year AET entry credential?", "options": ["BSET", "AAS (Associate of Applied Science)", "MBA", "PhD"], "answer": 1, "explain": "The AAS is the standard 2-year entry credential."}], "resources": [{"name": "RealPars", "url": "https://www.realpars.com/"}, {"name": "ISA", "url": "https://www.isa.org/"}, {"name": "SACA", "url": "https://www.saca.org/"}]}, {"id": 1, "title": "Electrical Fundamentals & Motor-Control Wiring", "objectives": ["Apply Ohm's law and Kirchhoff's laws to DC circuits", "Calculate RMS voltage/current in single/three-phase AC", "Read industrial motor-control schematics (ladder diagrams)", "Wire a 3-wire start/stop motor control circuit"], "sections": [{"h": "DC Fundamentals", "body": "<b>Ohm's Law:</b> V = I x R. <b>Power:</b> P = V x I.<br><b>KVL:</b> Voltage drops around a loop = 0. <b>KCL:</b> Currents in = currents out.<br><b>Series:</b> R_total = R1+R2+R3 (current same, voltage divides).<br><b>Parallel:</b> 1/R_total = 1/R1+1/R2 (voltage same, current divides).<br><i>Example:</i> 24V, R1=100, R2=200 series: I=80mA, V_R1=8V, V_R2=16V."}, {"h": "AC Fundamentals", "body": "<b>RMS:</b> V_rms = V_peak / sqrt(2). 120V outlet = 170V peak.<br><b>Three-phase:</b> V_line = V_phase x sqrt(3). 480V/277V, 208V/120V.<br><b>Power factor:</b> PF = cos(theta). Motors = lagging PF < 1."}, {"h": "Motor Control Circuits", "body": "<b>Power circuit:</b> L1/L2/L3 - disconnect - fuses - contactor(M) - OL - motor.<br><b>Control circuit:</b> 120V control transformer - Stop(NC) - Start(NO) - M coil - M aux(seal-in).<br><b>3-wire control:</b> Start momentarily energizes M; M aux seals in. Stop breaks seal. OL NC contact protects."}, {"h": "Reading Schematics", "body": "Ladder diagrams: two vertical rails, horizontal rungs. Devices: M=starter, OL=overload, CR=relay, PB=pushbutton, LS=limit switch, SOL=solenoid, PL=pilot light."}], "lab": {"title": "Start/Stop Circuit", "tool": "PLCfiddle or pen/paper", "steps": ["Draw 3-wire start/stop with Stop(NC), Start(NO), M coil, M aux, OL(NC)", "Trace current when Start pressed", "Trace when Stop pressed", "Add a pilot light for 'running'"]}, "quiz": [{"q": "480V 3-phase: what is phase voltage?", "options": ["480V", "277V", "208V", "120V"], "answer": 1, "explain": "V_phase = 480/sqrt(3) = 277V."}, {"q": "What seals in the motor coil after releasing Start?", "options": ["Overload relay", "M auxiliary contact (parallel with Start)", "Disconnect", "Gravity"], "answer": 1, "explain": "M aux contact seals in the coil."}, {"q": "What does NC overload contact do?", "options": ["Starts motor", "Speed control", "Opens to de-energize coil on overload", "Adds braking"], "answer": 2, "explain": "OL NC opens on overload, breaking coil circuit."}], "resources": [{"name": "All About Circuits - DC", "url": "https://www.allaboutcircuits.com/textbook/direct-current/"}, {"name": "All About Circuits - AC", "url": "https://www.allaboutcircuits.com/textbook/alternating-current/"}, {"name": "Khan Academy EE", "url": "https://www.khanacademy.org/science/electrical-engineering"}]}, {"id": 2, "title": "PLC Fundamentals", "objectives": ["Explain the PLC scan cycle", "Identify I/O types (discrete/analog, sinking/sourcing)", "Write basic ladder logic: XIC, XIO, OTE, OTL, OTU", "Describe IEC 61131-3 languages (LD, FBD, ST, SFC)"], "sections": [{"h": "What Is a PLC?", "body": "A <b>Programmable Logic Controller</b> reads inputs, executes a user program, and controls outputs in real time. Components: CPU, Power Supply, I/O Modules, Comm ports. Replaces hardwired relay logic with software."}, {"h": "The Scan Cycle", "body": "Every PLC repeats: <ol><li><b>Input Scan</b> - read all inputs to image table</li><li><b>Program Scan</b> - execute logic top-to-bottom using input image</li><li><b>Output Scan</b> - write output image to physical outputs</li><li><b>Housekeeping</b> - comms, diagnostics, watchdog</li></ol>Typical scan: 5-50ms."}, {"h": "Addressing", "body": "<b>Allen-Bradley Logix:</b> Tag-based names.<br><b>Siemens S7:</b> I0.0, Q0.0, M0.0, DB1.DBX0.0.<br><b>Legacy AB SLC:</b> I:1/0, O:0/0, B3:0/0.<br><b>Discrete:</b> 24VDC; NPN(sinking) vs PNP(sourcing).<br><b>Analog:</b> 4-20mA or 0-10V, 12-16 bit."}, {"h": "Basic Ladder Instructions", "body": "<b>XIC</b> (Examine Closed) - TRUE when bit=1<br><b>XIO</b> (Examine Open) - TRUE when bit=0<br><b>OTE</b> (Output Energize) - ON when rung true<br><b>OTL/OTU</b> - Latch/Unlatch (retentive)<br><b>Branches</b> - parallel=OR, series=AND"}, {"h": "IEC 61131-3 Languages", "body": "<b>LD</b> - Ladder (graphical, relay-style)<br><b>FBD</b> - Function Block (graphical blocks)<br><b>ST</b> - Structured Text (Pascal-like)<br><b>SFC</b> - Sequential Function Chart (state machine)<br>Most programs MIX: LD for discrete, ST for math, SFC for sequences."}], "lab": {"title": "Build Start/Stop in Ladder", "tool": "OpenPLC Editor (free)", "steps": ["Create BOOL vars: Start_PB, Stop_PB, Motor_Run, Seal", "Write ladder: (Start OR Seal) AND NOT Stop -> Seal; Seal -> Motor_Run", "Simulate and verify", "Add TON timer: 5s delay before Conveyor_Ready energizes"]}, "quiz": [{"q": "When does the PLC read physical inputs?", "options": ["Program scan", "Output scan", "Input scan (beginning)", "Housekeeping"], "answer": 2, "explain": "Inputs read at start of each scan."}, {"q": "XIO is TRUE when bit is:", "options": ["1 (ON)", "0 (OFF)", "Floating", "Pulsing"], "answer": 1, "explain": "XIO = TRUE when bit is 0 (OFF)."}, {"q": "Which IEC 61131-3 language is text-based like Pascal?", "options": ["Ladder", "FBD", "Structured Text", "SFC"], "answer": 2, "explain": "Structured Text is the text-based language."}], "resources": [{"name": "OpenPLC Project", "url": "https://openplcproject.com/"}, {"name": "PLCfiddle", "url": "https://plcfiddle.com/"}, {"name": "RealPars - PLC Basics", "url": "https://www.realpars.com/"}]}, {"id": 3, "title": "PLC Programming II - Timers, Counters & Data", "objectives": ["Program TON, TOF, RTO timers", "Program CTU/CTD counters", "Use comparison and math instructions", "Organize programs with subroutines/tasks"], "sections": [{"h": "Timers", "body": "<b>TON:</b> Accumulates while input TRUE; DN sets when ACC>=PRE; resets when input FALSE.<br><b>TOF:</b> DN ON immediately; counts after input FALSE; DN drops when ACC>=PRE.<br><b>RTO:</b> Like TON but retentive - needs explicit RES to clear.<br>Time base: PRE in ms (AB) or TIME type (Siemens T#5s)."}, {"h": "Counters", "body": "<b>CTU:</b> Increments on false-to-true transition. DN when ACC>=PRE.<br><b>CTD:</b> Decrements. DN when ACC<=0.<br>Applications: batch counting, part counting, shift production tracking."}, {"h": "Comparison & Math", "body": "<b>Compare:</b> EQU, NEQ, GRT, GEQ, LES, LEQ.<br><b>Math:</b> ADD, SUB, MUL, DIV, MOD, SQR.<br><b>Move:</b> MOV, COP, FLL.<br><i>Scaling example:</i> PSI = ((Raw - 6553) x 100) / 26214."}, {"h": "Program Organization", "body": "<b>AB Logix:</b> MainTask/MainRoutine calls subroutines via JSR. Separate routines for Inputs, Sequence, Outputs, Alarms, HMI.<br><b>Tasks:</b> Continuous, Periodic (fixed interval), Event (triggered).<br><b>Siemens:</b> OB1, FCs, FBs with instance DBs, global DBs."}], "lab": {"title": "Traffic Light Sequencer", "tool": "OpenPLC or CODESYS (free)", "steps": ["Create outputs: Red, Yellow, Green", "Use 3 TON timers: Green=10s, Yellow=3s, Red=10s", "Build sequence cycling through all states", "Add CTU counting cycles; at 10 set Maintenance_Due", "Add RES on Reset_PB"]}, "quiz": [{"q": "TON PRE=3000ms, input TRUE for 2s then FALSE. Final ACC?", "options": ["3000", "2000", "0", "5000"], "answer": 2, "explain": "TON resets ACC to 0 when input goes FALSE."}, {"q": "Which timer retains ACC when input drops?", "options": ["TON", "TOF", "RTO", "CTU"], "answer": 2, "explain": "RTO is retentive - keeps ACC, needs separate RES."}, {"q": "Scale raw 6553-32767 to 0-100:", "options": ["EU = Raw x 100", "EU = ((Raw-6553) x 100) / 26214", "EU = Raw / 327.67", "EU = Raw - 6553"], "answer": 1, "explain": "Subtract offset, multiply by EU span, divide by raw span."}], "resources": [{"name": "RealPars - Timers", "url": "https://www.realpars.com/"}, {"name": "CODESYS", "url": "https://www.codesys.com/"}, {"name": "The Automation Blog", "url": "https://theautomationblog.com/"}]}, {"id": 4, "title": "Sensors & Instrumentation", "objectives": ["Select sensor types for various measurement needs", "Wire NPN/PNP sensors to PLC inputs", "Interpret 4-20 mA signals and scale to engineering units", "Configure encoder feedback"], "sections": [{"h": "Discrete Sensors", "body": "<b>Inductive:</b> Metal only, 2-30mm range.<br><b>Capacitive:</b> Any material, shorter range.<br><b>Photoelectric:</b> Through-beam (longest range), Retroreflective, Diffuse (shortest).<br><b>Ultrasonic:</b> Any material, distance measurement.<br><b>NPN vs PNP:</b> NPN=sinking (switch to 0V), PNP=sourcing (switch to +V). Match to PLC input type."}, {"h": "Analog Instruments", "body": "<b>4-20 mA:</b> 4mA=zero (live zero - 0mA = wire break fault). Immune to wire resistance.<br><b>Temperature:</b> RTD (Pt100, accurate), Thermocouple (J/K/T, wide range), Thermistor.<br><b>Pressure:</b> Gauge/absolute/differential, diaphragm/strain gauge.<br><b>Flow:</b> Magnetic, Coriolis, Vortex, DP.<br><b>Level:</b> Ultrasonic, Radar, Capacitance, Float."}, {"h": "Encoders", "body": "<b>Incremental:</b> A/B (quadrature for direction), Z (index). Effective counts = PPR x 4.<br><b>Absolute:</b> Unique position code, no homing needed. SSI, BiSS output.<br>Applications: conveyor tracking, motor speed (RPM = pulses/time x 60/PPR)."}, {"h": "Scaling & Calibration", "body": "EU = ((Raw - Raw_Low) / (Raw_High - Raw_Low)) x (EU_High - EU_Low) + EU_Low<br><b>Calibration:</b> Apply known reference, verify mA output, adjust zero (4mA) and span (20mA)."}], "lab": {"title": "Sensor Wiring & Scaling", "tool": "Pen/paper + calculator", "steps": ["Draw PNP sensor wiring to 24VDC sinking PLC input", "Draw 2-wire 4-20mA transmitter to analog input", "Calculate: raw 19660 (range 6553-32767), 0-100 PSI = ? (Answer: 50 PSI)", "Encoder 1024 PPR with x4 decoding = ? counts/rev (4096)"]}, "quiz": [{"q": "4-20 mA reads 0 mA. What does this mean?", "options": ["Zero process value", "Full scale", "Wire break / transmitter failure", "Normal at 0%"], "answer": 2, "explain": "4mA = live zero. 0mA = broken loop."}, {"q": "PNP sensor switches which voltage when active?", "options": ["+V (supply)", "0V (ground)", "AC line", "4-20 mA"], "answer": 0, "explain": "PNP = sourcing = connects output to +V."}, {"q": "500 PPR encoder with x4 decoding:", "options": ["500", "1000", "2000", "4000"], "answer": 2, "explain": "500 x 4 = 2000 counts/rev."}], "resources": [{"name": "Inst Tools", "url": "https://instrumentationtools.com/"}, {"name": "AutomationDirect", "url": "https://www.automationdirect.com/"}, {"name": "RealPars - Sensors", "url": "https://www.realpars.com/"}]}, {"id": 5, "title": "Motors, VFDs & Drives", "objectives": ["Read motor nameplates (HP, FLA, RPM, SF, insulation, frame)", "Explain VFD operation (rectifier-DC bus-inverter, V/Hz)", "Configure essential VFD parameters", "Diagnose common VFD faults (OC, OV, UV, OL, GF, OH)"], "sections": [{"h": "AC Induction Motors", "body": "Stator creates rotating field; rotor dragged by induction (always slower = slip).<br><b>Sync speed:</b> n = 120 x f / P. 60Hz 4-pole = 1800RPM sync, ~1750 actual.<br><b>Nameplate:</b> HP, FLA, RPM, Voltage, SF (1.15 typ), Insulation (F=155C), NEMA frame, Enclosure (TEFC/ODP)."}, {"h": "VFD Principles", "body": "<b>Sections:</b> Rectifier (AC-DC, 6-pulse diode) - DC Bus (capacitors, ~650VDC for 480V) - Inverter (IGBT switching, variable V and f).<br><b>V/Hz:</b> Constant ratio maintains flux/torque. 460V/60Hz = 7.67V/Hz. At 30Hz output ~230V.<br><b>Vector control:</b> Independently controls flux and torque for better dynamics."}, {"h": "Key Parameters", "body": "Motor data (V, FLA, HP, RPM, Hz). Accel/Decel time. Current limit (150% 60s, 200% 3s). Control mode (V/Hz, Sensorless Vector, Closed-loop Vector). Braking (coast, DC injection, dynamic braking resistor, regen)."}, {"h": "Common Faults", "body": "<b>OC:</b> Overcurrent - short/ground/jam/fast accel.<br><b>OV:</b> Overvoltage - fast decel/regen/supply spike.<br><b>UV:</b> Undervoltage - power sag/blown phase fuse.<br><b>OL:</b> Overload (I2t) - sustained overload/poor ventilation.<br><b>GF:</b> Ground fault - damaged insulation/wet motor.<br><b>OH:</b> Overtemp - blocked fan/high ambient/carrier freq too high."}], "lab": {"title": "VFD Parameter Worksheet", "tool": "Any VFD manual PDF (free from vendor)", "steps": ["Download PowerFlex 525 Quick Start Guide", "Find motor nameplate params (P031-P034)", "Find Accel/Decel (P036-P037)", "Find Speed Reference Source options", "Find Overcurrent fault code and troubleshooting steps"]}, "quiz": [{"q": "4-pole motor at 45Hz, sync speed?", "options": ["1350 RPM", "900 RPM", "1800 RPM", "2700 RPM"], "answer": 0, "explain": "120 x 45 / 4 = 1350 RPM."}, {"q": "OV fault most often caused by:", "options": ["Low supply voltage", "Decel too fast (regen to bus)", "Shorted winding", "High ambient temp"], "answer": 1, "explain": "Fast decel pumps energy back to DC bus, spiking voltage."}, {"q": "Why maintain constant V/Hz?", "options": ["Save energy", "Maintain motor flux (torque capability)", "Reduce harmonics", "OSHA requirement"], "answer": 1, "explain": "Constant V/Hz = constant flux = rated torque at any speed."}], "resources": [{"name": "Rockwell Literature Library", "url": "https://www.rockwellautomation.com/en-us/support/documentation/literature-library.html"}, {"name": "RealPars - VFDs", "url": "https://www.realpars.com/"}, {"name": "Siemens SIOS", "url": "https://support.industry.siemens.com/"}]}, {"id": 6, "title": "Fluid Power - Pneumatics & Hydraulics", "objectives": ["Read ISO 1219 fluid-power symbols", "Design pneumatic circuits with DCVs and cylinders", "Apply Pascal's law for hydraulic force/speed", "Troubleshoot fluid-power faults"], "sections": [{"h": "Pneumatics", "body": "<b>Supply:</b> Compressor - receiver - FRL (Filter/Regulator/Lubricator) - valve - actuator.<br><b>DCVs:</b> 3/2, 5/2, 5/3 (ports/positions). Actuation: solenoid, pilot, spring-return.<br><b>5/2 valve:</b> Controls double-acting cylinder. <b>Flow control:</b> Meter-out preferred (smooth motion via back-pressure)."}, {"h": "Hydraulics", "body": "<b>Pascal's Law:</b> F = P x A.<br><i>Example:</i> 2000 PSI, 3in bore: A=pi(1.5^2)=7.07in2. F=14,137 lbs.<br><b>Components:</b> Reservoir - Pump - Relief valve - DCV - Actuator - Filter - return.<br><b>Speed:</b> v = Q/A. <b>Differences from pneumatics:</b> incompressible, much higher forces, needs return lines, heat management."}, {"h": "Symbols & Circuits", "body": "ISO 1219: squares=valve positions, arrows=flow, T=blocked, triangles=actuators (filled=hydraulic, empty=pneumatic).<br><b>Common circuits:</b> Extend/retract, speed control (meter-out), sequencing, regenerative (hydraulic fast-extend)."}, {"h": "Troubleshooting", "body": "<b>Pneumatic:</b> No motion=check supply/FRL/solenoid. Slow=flow restriction/leaks. Erratic=moisture/worn spool.<br><b>Hydraulic:</b> No motion=low fluid/pump fail/relief stuck. Slow=internal leak/high temp. Noisy pump=cavitation. Overheating=relief cracking/blocked cooler."}], "lab": {"title": "Design Pick-and-Place Circuit", "tool": "Pen/paper (ISO 1219 schematic)", "steps": ["Design 2-cylinder circuit: A(vertical lift) + B(horizontal extend)", "Sequence: B extend - A extend(grip) - B retract - A retract(place)", "Draw ISO 1219 schematic with FRL, 2x 5/2 valves, 2 cylinders, 4 limit switches", "Add meter-out flow controls", "Write PLC sequence (4 steps + transitions)"]}, "quiz": [{"q": "Hydraulic cylinder, 4in bore, 1500 PSI. Extend force?", "options": ["6000 lbs", "18,850 lbs", "4712 lbs", "1500 lbs"], "answer": 1, "explain": "A = pi(2^2) = 12.57in2. F = 1500 x 12.57 = 18,850 lbs."}, {"q": "Why meter-OUT preferred in pneumatics?", "options": ["Saves air", "Smoother motion via back-pressure", "Cheaper", "More force"], "answer": 1, "explain": "Back-pressure on exhaust controls piston speed smoothly. Meter-in causes jerky motion."}, {"q": "5/2 valve means:", "options": ["5 PSI, 2 gal", "5 ports, 2 positions", "5 cylinders, 2 valves", "Size 5 type 2"], "answer": 1, "explain": "5 ports (P,A,B,EA,EB) and 2 positions."}], "resources": [{"name": "Festo Didactic", "url": "https://www.festo.com/us/en/e/technical-education"}, {"name": "LibreTexts - Fluid Power", "url": "https://eng.libretexts.org/"}, {"name": "SMC Pneumatics", "url": "https://www.smcusa.com/"}]}, {"id": 7, "title": "HMI / SCADA Systems", "objectives": ["Design effective HMI screens (ISA-101 principles)", "Configure tags linking HMI to PLC data", "Implement alarm management (ISA-18.2)", "Set up trending/data logging"], "sections": [{"h": "HMI vs SCADA", "body": "<b>HMI:</b> Local operator panel at machine (PanelView, Comfort Panel, PC-based).<br><b>SCADA:</b> Plant-wide, aggregates multiple PLCs, historian, dashboards, remote. Examples: FactoryTalk View SE, WinCC, Ignition, Wonderware.<br><b>Modern trend:</b> Web-based (Ignition Perspective, AVEVA) - HTML5 clients."}, {"h": "Screen Design (ISA-101)", "body": "<b>Hierarchy:</b> L1 Overview - L2 Area - L3 Detail - L4 Diagnostic.<br><b>Principles:</b> Gray background, color for STATE only (green=run, red=fault, yellow=warn), minimal animation, 3-click max depth, 40x40px touch targets."}, {"h": "Tags", "body": "Tags = named data points linking HMI to PLC. Types: Analog (INT/REAL), Discrete (BOOL), String. HMI polls PLC via protocol (EtherNet/IP, OPC-UA, Modbus TCP)."}, {"h": "Alarms (ISA-18.2)", "body": "<b>States:</b> Normal - Unacknowledged - Acknowledged - RTN (clear).<br><b>Priorities:</b> 1=Critical, 2=High, 3=Medium, 4=Low.<br><b>Target:</b> <=10 alarms/hr normal; <=2 standing. <b>Shelving:</b> Temp suppress nuisance alarm (time-limited, audited)."}], "lab": {"title": "Build an HMI Screen", "tool": "FUXA (free, open-source) or pen/paper", "steps": ["Install FUXA (free, open-source web SCADA/HMI) - or sketch the screen on paper", "Create pump station: 1 pump, level + pressure transmitters", "Build detail screen: pump status, Start/Stop, level bar, pressure numeric", "Add 3 alarms: High Level (P2), Low Level (P3), Pump Fault (P1)", "Add trend chart (level + pressure, 30 min)"]}, "quiz": [{"q": "Recommended HMI background color?", "options": ["Bright blue", "Black", "Gray (neutral)", "White"], "answer": 2, "explain": "Gray reduces fatigue, makes status colors stand out."}, {"q": "ISA-18.2 target alarm rate?", "options": ["100/hr", "10/hr during normal operation", "1/day", "Unlimited"], "answer": 1, "explain": "<=10 alarms/hr normal; higher = alarm fatigue."}, {"q": "HMI tags vs PLC tags?", "options": ["Same thing", "HMI tags reference PLC tags via comm protocol", "HMI has no tags", "PLC tags are motor-only"], "answer": 1, "explain": "HMI tags are linked copies that poll PLC data via protocol."}], "resources": [{"name": "FUXA - open-source SCADA/HMI", "url": "https://github.com/frangoteam/FUXA"}, {"name": "RealPars - HMI/SCADA", "url": "https://www.realpars.com/"}, {"name": "ISA Standards", "url": "https://www.isa.org/standards-and-publications"}]}, {"id": 8, "title": "Industrial Networks & Fieldbus", "objectives": ["Compare device/control/enterprise network levels", "Configure Ethernet/IP communication", "Explain OPC-UA and IIoT role", "Troubleshoot network issues"], "sections": [{"h": "Network Levels", "body": "<b>Device:</b> Sensor/actuator to controller (IO-Link, AS-i, DeviceNet).<br><b>Control:</b> PLC-PLC, PLC-HMI, PLC-drives (EtherNet/IP, PROFINET, Modbus TCP, EtherCAT).<br><b>Enterprise:</b> Plant to business (standard TCP/IP, OPC-UA bridge)."}, {"h": "Ethernet/IP", "body": "CIP over standard Ethernet. <b>Implicit:</b> cyclic I/O (deterministic, RPI-based). <b>Explicit:</b> request/response (parameter reads). <b>Setup:</b> Static IPs, add to I/O tree, set RPI. <b>Topology:</b> Star (switches), DLR (ring for AB)."}, {"h": "OPC-UA", "body": "Vendor-neutral, platform-independent, secure. Server (PLC/gateway) - Client (HMI/SCADA/MES/cloud). Replaces OPC-DA (COM/DCOM Windows-only). THE IIoT backbone. Encrypted, authenticated, cross-platform."}, {"h": "Troubleshooting", "body": "<b>Tools:</b> Ping, ARP, Wireshark, switch LEDs.<br><b>Issues:</b> Duplicate IP, wrong subnet, bad cable (CRC errors), switch loop (broadcast storm), RPI too fast.<br><b>Best practices:</b> Separate control from enterprise (VLAN), managed switches, document IPs, label cables."}], "lab": {"title": "IP Address Planning", "tool": "Pen/paper + optional Wireshark", "steps": ["Design IP scheme: PLC=.10, HMI=.11, VFD=.20, Remote IO=.30, Gateway=.100 on 192.168.1.0/24", "Document in table: Device, IP, Subnet, Function", "Discuss: why NOT DHCP for control devices?", "Optional: capture traffic with Wireshark, filter for CIP packets"]}, "quiz": [{"q": "RPI in EtherNet/IP controls:", "options": ["Cable type", "How often I/O data is exchanged (ms)", "Voltage level", "Routing priority"], "answer": 1, "explain": "RPI = Requested Packet Interval (ms between cyclic exchanges)."}, {"q": "OPC-UA replaced OPC-DA mainly because:", "options": ["Faster", "Vendor-neutral, cross-platform, secure (no COM/DCOM)", "Less bandwidth", "Microsoft required it"], "answer": 1, "explain": "No COM/DCOM dependency; works on Linux/embedded; encrypted."}, {"q": "Can't ping new VFD. First step?", "options": ["Replace VFD", "Check IP/subnet and physical link LED", "Reboot PLC", "Call vendor"], "answer": 1, "explain": "Check physical layer and IP config first."}], "resources": [{"name": "OPC Foundation", "url": "https://opcfoundation.org/"}, {"name": "Wireshark", "url": "https://www.wireshark.org/"}, {"name": "RealPars - Networking", "url": "https://www.realpars.com/"}]}, {"id": 9, "title": "Robotics & Motion Control", "objectives": ["Identify robot types and applications", "Explain coordinate frames and motion types", "Program basic pick-and-place operations", "Apply robot safety standards (ISO 10218, R15.06)"], "sections": [{"h": "Robot Types", "body": "<b>6-axis Articulated:</b> Most versatile (welding, palletizing, tending).<br><b>SCARA:</b> 4-axis, fast horizontal assembly.<br><b>Delta:</b> Very fast pick-and-place, light payload.<br><b>Cartesian/Gantry:</b> Linear axes, large CNC/palletizing.<br><b>Cobot:</b> Shared workspace, force-limited."}, {"h": "Frames & Motion", "body": "<b>World/Base/Tool(TCP)/User frames.</b><br><b>Joint:</b> Each axis shortest path (fastest, curved).<br><b>Linear:</b> TCP straight line (predictable).<br><b>Circular:</b> TCP traces arc (3 points)."}, {"h": "Programming", "body": "Teach pendant: jog to position, record points, write program.<br><b>FANUC example:</b><br><pre>1: J P[1] 100% FINE\n2: L P[2] 500mm/sec CNT50\n3: L P[3] 100mm/sec FINE\n4: RO[1]=ON (gripper)\n5: L P[2] 500mm/sec CNT50\n6: J P[4] 100% CNT100\n7: L P[5] 100mm/sec FINE\n8: RO[1]=OFF</pre>FINE=stop at point, CNT=continuous."}, {"h": "Safety", "body": "<b>ISO 10218-1/-2:</b> Robot/system safety requirements.<br><b>ANSI/RIA R15.06:</b> US integrator standard; risk assessment required.<br><b>ISO/TS 15066:</b> Cobot force/pressure limits.<br><b>Safeguarding:</b> Fencing, light curtains, safety scanners, interlocked gates.<br><b>Teach mode:</b> 250mm/sec max speed."}], "lab": {"title": "Pick-and-Place Flowchart", "tool": "Pen/paper (flowchart)", "steps": ["Draw top-down layout: robot center, pick left, place right", "Define 5 positions: Home, Pick_Approach, Pick, Place_Approach, Place", "Write pseudocode program with J/L moves, gripper, waits", "Identify where FINE vs CNT and explain why", "List 3 safeguarding measures"]}, "quiz": [{"q": "Straight-line TCP motion type?", "options": ["Joint", "Linear", "Circular", "Random"], "answer": 1, "explain": "Linear moves TCP in a straight line."}, {"q": "Max TCP speed in teach mode (R15.06)?", "options": ["1000mm/s", "250mm/s", "500mm/s", "No limit"], "answer": 1, "explain": "250mm/sec max for human safety during programming."}, {"q": "Align with angled conveyor using which frame?", "options": ["World", "Base", "Tool", "User"], "answer": 3, "explain": "User frame aligns to a fixture/conveyor."}], "resources": [{"name": "FANUC eLearning", "url": "https://www.fanucamerica.com/support/training"}, {"name": "RealPars - Robotics", "url": "https://www.realpars.com/"}, {"name": "RIA Safety", "url": "https://www.robotics.org/"}]}, {"id": 10, "title": "Process Control & PID", "objectives": ["Distinguish open-loop from closed-loop control", "Explain P, I, D terms and effects", "Tune a PID loop systematically", "Read P&ID diagrams (ISA-5.1)"], "sections": [{"h": "Feedback Control", "body": "<b>Open loop:</b> No measurement feedback (hope it works).<br><b>Closed loop:</b> Measure PV, compare to SP, calculate error (E=SP-PV), output correction (CV). Continuously adjusts.<br><i>Example:</i> Level control: transmitter(PV) - PID controller - control valve(CV)."}, {"h": "PID Terms", "body": "<b>P:</b> Output proportional to error. Fast but leaves offset.<br><b>I:</b> Output proportional to accumulated error. Eliminates offset but can oscillate (windup).<br><b>D:</b> Output proportional to rate of change. Reduces overshoot but amplifies noise.<br><b>Combined:</b> CV = Kp*E + Ki*integral(E) + Kd*dE/dt. Most loops use PI (D=0 for noisy processes)."}, {"h": "Tuning", "body": "<b>Manual:</b> Set I=D=0. Increase Kp until oscillation (ultimate gain Ku, period Tu).<br>Set Kp=0.45*Ku, Ti=Tu/1.2 (Z-N PI formula).<br><b>Metrics:</b> Rise time, overshoot, settling time, steady-state error.<br><b>Anti-windup:</b> Limit integral when output saturated."}, {"h": "P&ID (ISA-5.1)", "body": "<b>Tag format:</b> 1st letter = measured variable (T=temp, P=pressure, F=flow, L=level). Following = function (I=indicator, C=controller, T=transmitter, V=valve).<br><i>Examples:</i> FIC-101 = Flow Indicating Controller. LT-205 = Level Transmitter.<br><b>Symbols:</b> Circle=field, circle+line=panel, square=DCS/PLC."}], "lab": {"title": "PID Simulation", "tool": "Free online PID simulator", "steps": ["Set first-order process (time const ~10s, dead time ~2s)", "P-only: observe offset after SP step", "Add I: observe offset eliminated", "Increase Kp until oscillation, note Ku", "Back off to 60% Ku, adjust Ki for <20% overshoot", "Try small Kd, observe effect", "Document final Kp, Ki, Kd"]}, "quiz": [{"q": "Integral (I) term eliminates:", "options": ["Overshoot", "Oscillation", "Steady-state error (offset)", "Noise"], "answer": 2, "explain": "I accumulates error to drive it to zero."}, {"q": "P&ID tag TT-304 means:", "options": ["Temperature Transmitter loop 304", "Total Throughput", "Test Terminal", "Timer Trigger"], "answer": 0, "explain": "T=Temp, T=Transmitter, 304=loop number."}, {"q": "Loop oscillating steadily - what to do?", "options": ["Increase Kp", "Decrease Kp", "Increase Ki", "Add dead time"], "answer": 1, "explain": "Oscillation = too much gain. Reduce Kp to stabilize."}], "resources": [{"name": "MIT OCW - Control Systems", "url": "https://ocw.mit.edu/"}, {"name": "Control.com - PID", "url": "https://control.com/"}, {"name": "RealPars - PID", "url": "https://www.realpars.com/"}]}, {"id": 11, "title": "Machine Safety & Functional Safety", "objectives": ["Conduct basic risk assessment (severity x probability x avoidance)", "Select safeguarding methods based on risk", "Interpret ISO 13849-1 PL and Categories", "Apply OSHA LOTO and NFPA 70E"], "sections": [{"h": "Risk Assessment", "body": "<b>ISO 12100 method:</b> Identify hazards (mechanical/electrical/thermal) - Estimate risk: S1/S2 (severity) x F1/F2 (frequency) x P1/P2 (avoidance) - Determine PLr from risk graph - Implement safeguards (eliminate > engineer > admin)."}, {"h": "Safeguarding", "body": "<b>Hard guards:</b> Fixed barriers (first choice).<br><b>Interlocked guards:</b> Guard + safety switch; stops machine when opened.<br><b>Presence-sensing:</b> Light curtains (Type 4/Cat 4), safety scanners, safety mats.<br><b>E-stop:</b> Cat 0 or 1 stop. <b>Safety PLCs:</b> GuardLogix, PILZ PNOZ, Siemens F-CPU."}, {"h": "ISO 13849-1", "body": "<b>Performance Level:</b> a (lowest) to e (highest PFHd).<br><b>Categories:</b> B (basic), 1 (well-tried), 2 (self-test), 3 (single-fault tolerant), 4 (single-fault tolerant + high diagnostic).<br><b>Typical:</b> PL e/Cat 4 = highest risk (robot cells). PL c/Cat 2 = moderate risk."}, {"h": "LOTO & Arc Flash", "body": "<b>OSHA 1910.147 LOTO:</b> Notify - Shutdown - Isolate - Lock/Tag - Verify zero energy.<br><b>Stored energy:</b> Pneumatic pressure, hydraulic accumulators, springs, capacitors (VFD DC bus!).<br><b>NFPA 70E:</b> Arc-flash boundaries, PPE categories (cal/cm2). De-energize whenever possible."}], "lab": {"title": "Risk Assessment Exercise", "tool": "Pen/paper scenario", "steps": ["Scenario: conveyor pinch point, operators reach in during operation", "Identify hazards: crush/pinch, entanglement", "Risk: S2 + F2 + P2 = PLr e", "Select safeguards: interlocked guard + light curtain (Cat 4/PL e)", "Write LOTO procedure: identify ALL energy sources, isolation points, verification"]}, "quiz": [{"q": "S2+F2+P2 on risk graph = PLr?", "options": ["PL a", "PL c", "PL d", "PL e"], "answer": 3, "explain": "Highest risk path = PLr e."}, {"q": "After lockout, you MUST:", "options": ["Start maintenance", "Verify zero energy (try start, check stored energy)", "Only tag it", "Wait 30 min"], "answer": 1, "explain": "Verification is mandatory - try start, check caps/pressure/springs."}, {"q": "ISO 13849 Category 3 means:", "options": ["No safety needed", "Single fault does NOT cause loss of safety function", "Basic principles only", "Software-only"], "answer": 1, "explain": "Cat 3 = single-fault tolerant via redundancy + diagnostics."}], "resources": [{"name": "OSHA 1910.147", "url": "https://www.osha.gov/laws-regs/regulations/standardnumber/1910/1910.147"}, {"name": "NFPA 70E/79", "url": "https://www.nfpa.org/codes-and-standards"}, {"name": "PILZ Safety Knowledge", "url": "https://www.pilz.com/en-US/knowledge"}, {"name": "Rockwell GuardLogix", "url": "https://www.rockwellautomation.com/en-us/support/documentation/literature-library.html"}]}, {"id": 12, "title": "Capstone - System Integration & Career Paths", "objectives": ["Integrate all AET domains into a complete cell design", "Develop a commissioning checklist", "Map personal skill gaps to learning goals", "Identify certification/degree pathways"], "sections": [{"h": "Integration Mindset", "body": "Real systems integrate ALL domains: Electrical + PLC + HMI + Network + Drives + Sensors + Fluid Power + Robotics + Safety.<br><b>Your job:</b> Understand interconnections. Troubleshoot ACROSS domain boundaries - the fault may be network, not PLC; mechanical, not electrical."}, {"h": "Commissioning", "body": "<b>Pre-power:</b> Verify wiring vs drawings, check torque, megger motors, verify grounding, inspect pneumatic/hydraulic lines.<br><b>Power-on (no motion):</b> Control power only. Check PLC I/O mapping. Verify HMI comms. Ping devices.<br><b>Motion (jog):</b> Jog each axis. Verify direction. Check sensors. Test safety (E-stop, curtain, gate).<br><b>Auto:</b> Step-by-step sequence. Verify cycle time. Load product. Production run. Document settings."}, {"h": "Career Paths", "body": "<b>Entry (AAS/certs):</b> Maintenance Tech, Automation Tech, Robotics Tech, Instrumentation Tech.<br><b>Growth (experience + BS/certs):</b> Automation Engineer (Amazon L4-L5 AE), Controls Engineer, System Integrator, Reliability Engineer, Engineering Manager.<br><b>Certifications:</b> ISA CCST L1-L3, SACA C-101/C-201, FANUC, Rockwell/Siemens, NFPA 70E QEW."}, {"h": "Personal Development Plan", "body": "Rate yourself 1-5 on each of 10 domains. Identify bottom 3 = priority growth areas.<br><b>Action plan:</b> Domain - Current level - Target level - Resources (from this course) - Practice method - Validation (cert/project/peer review). Revisit quarterly."}], "lab": {"title": "Design Complete Automated Cell", "tool": "Paper/whiteboard", "steps": ["Design palletizing cell: robot picks boxes from conveyor, stacks on pallet (4x3x3 layers)", "Draw layout: conveyor(VFD), photoeye, robot(vacuum gripper), pallet station, safety fencing + gate + light curtain", "List components by domain: Electrical, PLC I/O list, Sensors, Network IPs, Safety devices+PL", "Write high-level sequence: wait-detect-pick-place-count-layer-full-signal", "Create 10-item commissioning checklist", "Identify which domains this touches (all 10!)"]}, "quiz": [{"q": "Before applying power to a new machine:", "options": ["Run auto to check errors", "Verify wiring point-to-point, check torque, megger motors, verify grounding", "Just turn it on", "Program PLC first"], "answer": 1, "explain": "Pre-power checks prevent catastrophic damage."}, {"q": "HMI shows 'I/O Comm Loss' on gripper valve. First check:", "options": ["Replace robot", "Network connection to remote I/O module (cable, LED, IP)", "Recalibrate valve", "Reprogram robot"], "answer": 1, "explain": "Comm loss = network issue. Check physical, then link, then IP."}, {"q": "ISA CCST has how many levels?", "options": ["1", "2", "3", "5"], "answer": 2, "explain": "ISA CCST: Level I (entry), II (experienced), III (expert)."}], "resources": [{"name": "ISA CCST", "url": "https://www.isa.org/certification"}, {"name": "SACA", "url": "https://www.saca.org/"}, {"name": "ABET Programs", "url": "https://www.abet.org/accreditation/find-programs/"}, {"name": "Amazon Jobs - RME", "url": "https://www.amazon.jobs/"}]}, {"id": 13, "title": "Advanced PLC - Structured Text, AOIs & Fault Handling", "objectives": ["Write Structured Text with IF/CASE/FOR/WHILE", "Create reusable Add-On Instructions (AOIs) and UDTs", "Implement fault handling (major/minor faults, recovery)", "Design state machines using CASE or SFC"], "sections": [{"h": "Structured Text Deep Dive", "body": "<b>Why ST?</b> Complex math, loops, conditionals are cleaner than ladder. Mix LD for discrete + ST for logic.<br><pre>IF condition THEN action;\nELSIF other THEN action2;\nELSE default;\nEND_IF;\n\nCASE state OF\n  0: (* idle *)\n  10: (* running *)\n  99: (* fault *)\nEND_CASE;\n\nFOR i := 0 TO 9 DO\n  array[i] := 0;\nEND_FOR;</pre><b>Data types:</b> BOOL, INT/DINT, REAL, STRING, arrays, structures (UDTs)."}, {"h": "Add-On Instructions (AOIs)", "body": "<b>AOI</b> = reusable custom block with inputs, outputs, local data. Like a function.<br><b>Use cases:</b> Motor control (standardized), valve control, PID wrapper, alarm handler.<br><b>Structure:</b> Parameters (InOut/Input/Output), Local tags (hidden), Logic (LD/ST/FBD inside).<br><b>Benefits:</b> Tested once, used everywhere, version-controlled.<br><b>Siemens:</b> Function Blocks (FBs) with instance DBs."}, {"h": "User-Defined Types (UDTs)", "body": "<pre>TYPE Motor_Data:\n  Running  : BOOL;\n  Faulted  : BOOL;\n  Speed_Cmd: REAL;\n  Speed_Fbk: REAL;\n  Amps     : REAL;\n  RunHours : DINT;\n  FaultCode: INT;\nEND_TYPE;</pre>Create: <code>Motors : ARRAY[0..19] OF Motor_Data;</code> - 20 motors, identical structure. Cleaner than 140 tags."}, {"h": "Fault Handling", "body": "<b>Major faults (AB):</b> Halt controller - type 1 (power-up), type 4 (I/O), type 6 (instruction). Create Controller Fault Handler to catch/log/recover.<br><b>Design pattern:</b> Every AOI has .FaultCode + .Faulted. Fault routine logs to FIFO buffer. Recovery: clear fault, safe state, require operator acknowledge."}, {"h": "State Machines", "body": "<pre>CASE Machine_State OF\n  0:  (* IDLE *) IF Start AND NOT Fault THEN State:=10; END_IF;\n  10: (* STARTING *) RunSequence(); IF Done THEN State:=20; END_IF;\n  20: (* RUNNING *) IF Stop THEN State:=30; END_IF;\n      IF Fault THEN State:=99; END_IF;\n  30: (* STOPPING *) StopSeq(); IF Stopped THEN State:=0; END_IF;\n  99: (* FAULTED *) AllOff(); IF Reset AND NOT Fault THEN State:=0; END_IF;\nEND_CASE;</pre>Explicit states, clear transitions, easy debug."}], "lab": {"title": "Build a Motor Control AOI", "tool": "OpenPLC or CODESYS (free)", "steps": ["Create UDT Motor_Ctrl: Cmd_Start, Cmd_Stop, Running, Faulted, RunTimer, FaultCode", "Create FB_Motor: inputs Start/Stop/OL_Fault/E_Stop; outputs Motor_Out/Running/Faulted", "Implement ST state machine: IDLE/STARTING/RUNNING/FAULTED", "Test: Start (should run); OL_Fault (should fault, output off); E_Stop (immediate off)", "Reuse: instantiate 3 times for 3 motors, verify independence"]}, "quiz": [{"q": "Main advantage of Add-On Instructions (AOIs)?", "options": ["Run faster", "Reusable tested-once logic blocks with encapsulated data", "Replace all ladder", "Only work in ST"], "answer": 1, "explain": "AOIs = write once, test once, reuse everywhere with consistent behavior."}, {"q": "FAULT state in a state machine should:", "options": ["Continue running", "Turn off outputs, wait for fault clear + operator reset", "Power cycle PLC", "Delete program"], "answer": 1, "explain": "Fault = safe state (outputs off) + require both fault cleared AND operator acknowledge before restart."}, {"q": "AB Major Fault Type 4 indicates:", "options": ["Math overflow", "I/O communication failure", "Power supply issue", "Download needed"], "answer": 1, "explain": "Type 4 = I/O fault (module not responding, rack power loss, RPI timeout)."}], "resources": [{"name": "Rockwell AOI Guide", "url": "https://www.rockwellautomation.com/en-us/support/documentation/literature-library.html"}, {"name": "CODESYS Function Blocks", "url": "https://www.codesys.com/"}, {"name": "The Automation Blog - ST", "url": "https://theautomationblog.com/"}]}, {"id": 14, "title": "IIoT & Industry 4.0", "objectives": ["Define IIoT, Industry 4.0, Smart Factory", "Identify edge/fog/cloud architecture layers", "Explain MQTT protocol for industrial data", "Assess OT cybersecurity risks (IEC 62443)"], "sections": [{"h": "What Is IIoT / Industry 4.0?", "body": "<b>IIoT</b> = connecting industrial equipment to networks for data collection, analysis, optimization beyond traditional SCADA.<br><b>Industry 4.0</b> = 4th industrial revolution: cyber-physical systems, AI/ML, digital twins.<br><b>Smart Factory pillars:</b> Connectivity, Visibility, Transparency, Predictive, Adaptability.<br><b>RME context:</b> Monitron (vibration PdM), Compass dashboards, robotic fleet management."}, {"h": "Edge-Fog-Cloud Architecture", "body": "<b>Edge:</b> Sensors/PLCs generating data. Lightweight processing on gateways (Pi, industrial PCs, Ignition Edge).<br><b>Fog/MES:</b> On-premise servers, local analytics, SCADA/historians. Works if internet drops.<br><b>Cloud:</b> AWS/Azure - big data, ML training, fleet analytics. Higher latency, massive scale.<br><b>Rule:</b> Safety-critical control stays at edge. Never put safety logic in the cloud."}, {"h": "MQTT Protocol", "body": "<b>MQTT</b> = lightweight publish/subscribe for constrained devices.<br><b>Broker</b> (Mosquitto/HiveMQ) + <b>Publishers</b> (devices) + <b>Subscribers</b> (apps).<br><b>Topics:</b> <code>site/ACY1/conveyor/sorter1/speed</code> - hierarchical.<br><b>QoS:</b> 0 (fire-forget), 1 (at least once), 2 (exactly once).<br><b>Sparkplug B:</b> Industrial MQTT spec for SCADA (Ignition MQTT module uses it)."}, {"h": "OT Cybersecurity (IEC 62443)", "body": "<b>Risk:</b> Connecting floor to networks exposes PLCs/drives to threats.<br><b>IEC 62443:</b> Security Levels (SL 1-4), zones/conduits, lifecycle requirements.<br><b>Practical:</b> Network segmentation (IT/OT DMZ), port security, disable unused protocols, patch carefully, physical access control, application whitelisting, PLC program backups.<br><b>Reality:</b> Many PLCs have default passwords, open Telnet. AET techs are front-line OT hygiene."}], "lab": {"title": "MQTT Pub/Sub Demo", "tool": "Mosquitto (free) + MQTT Explorer (free)", "steps": ["Install Mosquitto broker + MQTT Explorer", "Start broker on localhost:1883", "Subscribe to 'factory/conveyor/#'", "Publish: mosquitto_pub -t factory/conveyor/speed -m '45.2'", "Observe message in Explorer", "Publish 5 values simulating speed sensor every 2s", "Discuss: payload format (JSON vs Sparkplug B)?"]}, "quiz": [{"q": "Which layer handles real-time machine control?", "options": ["Cloud", "Edge (PLC/sensor level)", "Fog only", "Enterprise ERP"], "answer": 1, "explain": "Time-critical control (ms response) must stay at edge. Cloud latency is unacceptable for real-time control."}, {"q": "MQTT uses what messaging pattern?", "options": ["Request/Response", "Publish/Subscribe via broker", "Peer-to-peer", "Polling"], "answer": 1, "explain": "MQTT = pub/sub through a broker. Publishers send to topics, subscribers receive from topics. Decoupled and lightweight."}, {"q": "IEC 62443 addresses:", "options": ["Motor wiring", "Industrial cybersecurity for automation", "PLC languages", "Hydraulic sizing"], "answer": 1, "explain": "IEC 62443 = THE standard for OT/industrial automation cybersecurity."}], "resources": [{"name": "Mosquitto MQTT", "url": "https://mosquitto.org/"}, {"name": "MQTT Explorer", "url": "https://mqtt-explorer.com/"}, {"name": "ISA/IEC 62443", "url": "https://www.isa.org/standards-and-publications/isa-standards/isa-iec-62443-series-of-standards"}]}, {"id": 15, "title": "Electrical Troubleshooting & Test Equipment", "objectives": ["Use DMM safely for V/I/R/continuity", "Interpret megohmmeter insulation tests", "Apply systematic troubleshooting (half-split, signal trace)", "Use oscilloscopes for drive/signal analysis"], "sections": [{"h": "DMM Mastery", "body": "<b>Voltage (parallel):</b> AC vs DC, True RMS required for VFD outputs.<br><b>Current:</b> Clamp meter preferred (non-contact). Inrush vs running.<br><b>Resistance (de-energized!):</b> Isolate component. Motor windings balanced within 5%.<br><b>Safety:</b> CAT III/IV rated. Live-dead-live procedure. Never measure ohms on energized circuit."}, {"h": "Megohmmeter (Insulation Resistance)", "body": "<b>Purpose:</b> Test motor/cable insulation at 500V or 1000V DC.<br><b>Motor test:</b> Disconnect leads, mega phase-to-ground. Good: >100M; Caution: 5-100M; Bad: <5M.<br><b>Rule of thumb:</b> Min = 1M per kV + 1M (480V motor: min ~2M).<br><b>PI test:</b> 10min/1min ratio. PI>2 = good; PI<1.5 = degraded."}, {"h": "Systematic Troubleshooting", "body": "<b>Half-split:</b> Test midpoint - good=downstream, bad=upstream. Repeat. Logarithmic efficiency.<br><b>Symptom-based:</b> List causes, check most likely/easiest first.<br><b>Signal trace:</b> Follow signal source-to-destination. PLC output ON? Wire OK? Relay energized? Contact closed? Each step narrows fault.<br><b>Principle:</b> POWER -> SIGNAL -> LOAD."}, {"h": "Oscilloscope Basics", "body": "<b>When:</b> DMM shows RMS only - useless for PWM/encoder/comm signals.<br><b>VFD output:</b> See PWM pattern. Verify 3 phases present/symmetric.<br><b>Encoders:</b> Clean square waves, 90deg quadrature, Z pulse present.<br><b>Tools:</b> Fluke ScopeMeter (CAT III rated, battery, portable)."}], "lab": {"title": "Troubleshooting Scenarios", "tool": "Pen/paper scenarios", "steps": ["Scenario 1: Motor won't start, PLC output ON. Signal-trace from PLC output to motor terminals.", "Scenario 2: VFD Ground Fault. What to disconnect, megger, isolate (motor vs cable vs drive)?", "Scenario 3: Wrong speed. VFD cmd correct. Causes? (slip, wrong motor data, encoder fault, overload)", "For each: most likely cause, first 3 checks, tools needed", "Draw live-dead-live verification procedure"]}, "quiz": [{"q": "Before measuring resistance with DMM:", "options": ["Set AC mode", "De-energize and isolate the component", "Use highest range only", "Measure voltage on same leads"], "answer": 1, "explain": "NEVER measure ohms on energized circuits. De-energize, lock out, verify dead, THEN measure."}, {"q": "Motor insulation 3 Megohms on 480V motor:", "options": ["Excellent", "Caution - marginal, monitor/schedule replacement", "Perfect per IEEE", "Failed immediately"], "answer": 1, "explain": "Min = ~2M. 3M is above minimum but in caution zone (<100M). Monitor trend; if declining, plan replacement."}, {"q": "Half-split troubleshooting:", "options": ["Replace half the parts", "Test midpoint to find which half has the fault, repeat", "Split the team", "Run at half speed"], "answer": 1, "explain": "Each test eliminates half the circuit. Logarithmically efficient for long signal chains."}], "resources": [{"name": "Fluke Multimeter Guides", "url": "https://www.fluke.com/en-us/learn/blog/electrical"}, {"name": "All About Circuits - Test Equipment", "url": "https://www.allaboutcircuits.com/textbook/"}, {"name": "Inst Tools - Insulation Testing", "url": "https://instrumentationtools.com/"}]}, {"id": 16, "title": "Preventive & Predictive Maintenance (Reliability)", "objectives": ["Differentiate reactive/preventive/predictive/prescriptive maintenance", "Calculate MTBF, MTTR, availability", "Interpret vibration analysis basics (FFT, bearing frequencies)", "Design a PM program for automated equipment"], "sections": [{"h": "Maintenance Strategies", "body": "<b>Reactive:</b> Fix when broken. OK for non-critical only.<br><b>Preventive (PM):</b> Time/usage-based scheduled tasks. Prevents some failures.<br><b>Predictive (PdM):</b> Condition-based monitoring (vibration, temp, oil). Maintain when degradation detected. Optimal.<br><b>Prescriptive:</b> AI recommends action (Amazon Monitron example)."}, {"h": "Key Metrics", "body": "<b>MTBF</b> = Total uptime / Failures. Higher = more reliable.<br><b>MTTR</b> = Total downtime / Repairs. Lower = faster response.<br><b>Availability</b> = MTBF / (MTBF+MTTR). Ex: 200hr/202hr = 99.0%.<br><b>OEE</b> = Availability x Performance x Quality. World-class: 85%+.<br><b>Amazon:</b> DPMO (jam rate), PM compliance, backlog aging."}, {"h": "Vibration Analysis Basics", "body": "<b>Why:</b> Rotating equipment telegraphs failure through vibration weeks before catastrophe.<br><b>Signatures:</b> 1x RPM = imbalance; 2x = misalignment; Bearing freqs (BPFO/BPFI) = bearing degradation; 2x line freq (120Hz) = electrical issue.<br><b>ISO 10816:</b> Good (<1.8mm/s) to Danger (>11.2mm/s) for Class II machines."}, {"h": "PM Program Design", "body": "<b>Steps:</b> 1) Asset criticality (A/B/C). 2) Failure mode analysis. 3) Task selection (predict vs prevent). 4) Schedule (balance across shifts). 5) Execute + document in CMMS. 6) Improve (extend intervals if PM finds nothing; shorten if failures occur between)."}], "lab": {"title": "PM Program Design", "tool": "Spreadsheet or pen/paper", "steps": ["Pick 3 site assets (motor, divert, pneumatic cylinder)", "List 2-3 failure modes + warning signs each", "Assign strategy (reactive/PM/PdM) with justification", "Define task, tools, interval for each PM", "Calculate: MTBF=2000hr, MTTR=4hr, Availability=? (99.8%)", "Discuss: how would vibration monitoring change MTBF/MTTR?"]}, "quiz": [{"q": "1x RPM vibration on a motor indicates:", "options": ["Bearing failure", "Imbalance (most common)", "Electrical fault", "Cavitation"], "answer": 1, "explain": "1x RPM = shaft speed frequency = rotor imbalance. Most common vibration problem. Fix by balancing."}, {"q": "MTBF=500hr, MTTR=5hr. Availability?", "options": ["99.0%", "90.0%", "50.0%", "95.0%"], "answer": 0, "explain": "500/(500+5) = 500/505 = 99.0%."}, {"q": "Predictive maintenance is:", "options": ["Fix after failure", "Replace on fixed schedule", "Monitor condition, maintain when degradation detected", "Hire more techs"], "answer": 2, "explain": "PdM = condition-based. Intervene only when trending toward failure."}], "resources": [{"name": "Mobius Institute (vibration)", "url": "https://www.mobiusinstitute.com/"}, {"name": "AWS Monitron", "url": "https://aws.amazon.com/monitron/"}, {"name": "ISO 10816 summary", "url": "https://instrumentationtools.com/"}]}, {"id": 17, "title": "Control Panel Design & Build", "objectives": ["Read/create panel layouts per NFPA 79 / IEC 61439 / UL 508A", "Select and size breakers, contactors, wire, enclosures", "Apply wiring practices: separation, labeling, ferrules", "Perform point-to-point verification and commissioning"], "sections": [{"h": "Standards", "body": "<b>NFPA 79:</b> Electrical standard for industrial machinery panels (NA). Covers enclosures, overcurrent, grounding, wire sizing, labeling.<br><b>IEC 61439:</b> International LV switchgear/controlgear assemblies.<br><b>UL 508A:</b> Industrial control panels (US listing). Defines SCCR (Short-Circuit Current Rating).<br><b>Requirements:</b> Door-disconnect interlock, SCCR calculation, grounding, ventilation, bending radius."}, {"h": "Component Selection", "body": "<b>Enclosure:</b> NEMA 4 (watertight), NEMA 12 (dusttight), NEMA 1 (general). 20-30% spare space. RAL 7035 gray.<br><b>Main breaker:</b> Full-load + 125% continuous. Door-interlocked.<br><b>Motor circuits:</b> Breaker + contactor + overload. VFD: 1.5-2x drive FLA for inrush.<br><b>Control transformer:</b> 480V->120V. Size VA + 20% margin.<br><b>Terminal blocks:</b> DIN-rail, labeled, ferrules. Separate power/signal.<br><b>24VDC PSU:</b> For PLC I/O and sensors."}, {"h": "Wiring Practices", "body": "<b>Separation:</b> Power and signal in SEPARATE ducts. Never mix 480V with 24VDC.<br><b>Sizing:</b> NEC ampacity. Typical: #14 for 120V control, #12 for 20A, #10-4 for motors by HP.<br><b>Labeling:</b> Every wire numbered (matches schematic). Print labels. Every TB position labeled.<br><b>Ferrules:</b> On all stranded wire to terminal blocks.<br><b>Colors (NFPA 79):</b> Black=power; White=neutral; Green/GY=ground; Red=AC control; Blue=DC."}, {"h": "Commissioning", "body": "<b>Pre-power:</b> 1) Point-to-point verify all wires. 2) Torque check terminals. 3) Grounding continuity. 4) Megger motors (VFD disconnected!). 5) Remove debris. 6) Verify interlock.<br><b>Power-up:</b> Control circuit first (verify PLC/HMI). Then main power motors off (verify voltages). Then jog each motor individually (check rotation/current)."}], "lab": {"title": "Panel Layout Exercise", "tool": "Graph paper or diagrams.net (free)", "steps": ["Design panel for: 1 VFD (10HP/480V), CompactLogix, 24VDC PSU, control transformer, terminal blocks", "Draw DIN-rail layout: Top=disconnect+breakers, Middle=VFD+PLC+PSU, Bottom=TBs", "Draw single-line power diagram", "List wire sizes for each segment with justification", "Create terminal block numbering scheme", "List 5-item pre-power checklist"]}, "quiz": [{"q": "Power and signal wiring should be:", "options": ["Same wireway for convenience", "Separate wireways to prevent noise", "Only signal needs ducts", "Mix freely"], "answer": 1, "explain": "Separation prevents noise coupling. 480V next to 24VDC = false readings, erratic PLC, potential damage."}, {"q": "What is SCCR?", "options": ["Standard Circuit Component Rating", "Short-Circuit Current Rating - max fault current panel can withstand", "Signal Cable Connector Rating", "System Control Circuit Resistance"], "answer": 1, "explain": "SCCR must be >= available fault current at installation point. Required by UL 508A / NEC."}, {"q": "First power-up sequence:", "options": ["Full power immediately", "Control circuit first, then main power motors off, then jog each motor", "Only if customer watches", "Skip verification"], "answer": 1, "explain": "Staged power-up catches wiring errors before damage."}], "resources": [{"name": "NFPA 79", "url": "https://www.nfpa.org/codes-and-standards"}, {"name": "AutomationDirect - Panel Design", "url": "https://www.automationdirect.com/"}, {"name": "Diagrams.net (free)", "url": "https://www.diagrams.net/"}]}, {"id": 18, "title": "Career Acceleration - Portfolio, Interviews & Certifications", "objectives": ["Build a technical portfolio demonstrating AET competency", "Prepare for controls/automation interviews (technical + behavioral)", "Create a certification roadmap by ROI", "Develop a 12-month professional development plan"], "sections": [{"h": "Technical Portfolio", "body": "<b>Include:</b> PLC programs (screenshots, logic explanation), panel builds (photos, schematics), troubleshooting stories (problem/diagnosis/fix/time), automation projects (even personal OpenPLC+Pi), certs earned, training completed.<br><b>Format:</b> Physical binder + digital (GitHub Pages/PDF).<br><b>Key:</b> Show the PROCESS, not just result. Demonstrate WHY, not just WHAT."}, {"h": "Interview Preparation", "body": "<b>Technical questions:</b> PLC scan cycle? Troubleshoot motor that won't start? NPN vs PNP? How does VFD control speed? What causes OV? Purpose of LOTO? Read this ladder - what does it do? Why 4-20mA not 0-20?<br><b>Behavioral (STAR):</b> Difficult equipment problem? Prioritize multiple machines down? Learn new technology quickly?<br><b>Amazon LPs:</b> Bias for Action, Dive Deep, Ownership, Invent & Simplify."}, {"h": "Certification Roadmap", "body": "<b>Tier 1 (1-3 mo):</b> OSHA 10/30, MSSC CPT, NFPA 70E QEW.<br><b>Tier 2 (3-6 mo):</b> ISA CCST Level 1, SACA C-101, Rockwell cert.<br><b>Tier 3 (6-12 mo):</b> ISA CCST L2, FANUC Robot Programmer, Siemens SITRAIN, SACA C-201.<br><b>Tier 4 (expert):</b> ISA CCST L3, ISA CAP, PE license.<br><b>Best ROI:</b> ISA CCS function chk(mid,qi,sel){
  const m=M.find(x=>x.id===mid),q=m.quiz[qi],fb=document.getElementById(`q${mid}_${qi}_f`);
  if(sel===q.answer){fb.className='qf c';fb.textContent='\u2713 Correct! '+q.explain;}
  else{fb.className='qf w';fb.textContent='\u2717 Incorrect. '+q.explain;}
  // score tracking
  if(!scores[mid])scores[mid]=0;
  const allQ=document.querySelectorAll(`[id^="q${mid}_"][id$="_f"]`);
  let correct=0;allQ.forEach(f=>{if(f.classList.contains('c'))correct++;});
  scores[mid]=correct;save();
}

<div class="desc">Synchronous RPM = 120 x f / poles. Slip = (Ns - Nfl) / Ns. Constant V/Hz keeps motor flux steady below base speed.</div>

function scale420(){
  const t=document.getElementById('sc_type').value;
  const val=parseFloat(v('sc_in'))||0,lo=parseFloat(v('sc_lo'))||0,hi=parseFloat(v('sc_hi'))||0;
  let pct=(t==='ma')?(val-4)/16*100:val/32767*100;
  const eu=lo+(pct/100)*(hi-lo);
  const mm=(t==='ma')?val:(4+val/32767*16);
  document.getElementById('sc_out').innerHTML=`Percent of span: <b>${pct.toFixed(1)}%</b><br>Engineering value: <span class="big">${eu.toFixed(2)}</span><br>Equivalent current: <b>${mm.toFixed(2)} mA</b>`+((pct<0||pct>100)?'<br><span style="color:var(--warn)">&#9888; Out of 4-20 mA range &mdash; possible sensor fault / broken wire</span>':'');
}
function calcRel(){
  const up=parseFloat(v('r_up'))||0,f=parseFloat(v('r_f'))||0,dn=parseFloat(v('r_dn'))||0,perf=(parseFloat(v('r_perf'))||0)/100,ql=(parseFloat(v('r_q'))||0)/100;
  const mtbf=f>0?up/f:up,mttr=f>0?dn/f:0,avail=(mtbf+mttr)>0?mtbf/(mtbf+mttr):1,oee=avail*perf*ql;
  document.getElementById('r_out').innerHTML=`MTBF: <b>${mtbf.toFixed(1)} h</b> &nbsp; MTTR: <b>${mttr.toFixed(2)} h</b><br>Availability: <b>${(avail*100).toFixed(2)}%</b><br>OEE: <span class="big">${(oee*100).toFixed(1)}%</span> <span style="font-size:.8rem;color:var(--text2)">(world-class &ge; 85%)</span>`;
}
function calcVHz(){
  const f=parseFloat(v('m_f'))||0,p=parseFloat(v('m_p'))||4,vt=parseFloat(v('m_v'))||0,fl=parseFloat(v('m_fl'))||0;
  const ns=p>0?120*f/p:0,slip=ns>0?(ns-fl)/ns*100:0,vhz=f>0?vt/f:0;
  document.getElementById('m_out').innerHTML=`Synchronous speed: <b>${ns.toFixed(0)} RPM</b><br>Slip: <b>${slip.toFixed(1)}%</b><br>V/Hz ratio: <span class="big">${vhz.toFixed(2)} V/Hz</span> <span style="font-size:.8rem;color:var(--text2)">(460V / 60Hz &approx; 7.67)</span>`;
}
let sealRun=false,sealOLok=true;
function sealStart(down){if(down&&sealOLok)sealRun=true;sealDraw();}
function sealStop(){sealRun=false;sealDraw();}
function sealOL(){sealOLok=!sealOLok;if(!sealOLok)sealRun=false;const b=document.getElementById('seal_ol');if(b)b.textContent=sealOLok?'Trip Overload':'Reset Overload';sealDraw();}
function sealDraw(){
  const el=document.getElementById('seal_out');if(!el)return;
  el.innerHTML=`Motor coil M: <span class="lamp ${sealRun?'on':''}"></span> <b>${sealRun?'RUNNING':'stopped'}</b><br>Seal-in aux contact: <b>${sealRun?'closed (holding)':'open'}</b> &nbsp; Overload: <b>${sealOLok?'OK':'TRIPPED'}</b><br><span style="font-size:.8rem;color:var(--text2)">Tip: hold Start to energize, then release &mdash; the seal-in keeps the motor running until Stop or an overload trip.</span>`;
}
// ---- Final Exam ----
let examQ=[],examAns={},examResult=null;
function buildExamPool(){let p=[];M.forEach(m=>{if(m.quiz)m.quiz.forEach(q=>p.push({q:q.q,options:q.options,answer:q.answer,explain:q.explain,mod:m.id}));});return p;}
function showExam(){
  cur=-2;gloss.style.display='none';main.style.display='block';buildNav();
  const last=JSON.parse(localStorage.getItem('aet_exam')||'null');
  let h=`<div class="tab-bar"><div class="tab" onclick="showMod(0)">Modules</div><div class="tab active">Final Exam</div></div>`;
  h+=`<div class="exam-hd"><h2>&#127891; Final Exam</h2><p>20 questions drawn at random from all ${M.length} modules. Passing score: <b>80% (16/20)</b>. Retake as many times as you like &mdash; you get a fresh random set each attempt.</p>`;
  if(last)h+=`<p>Last attempt: <b style="color:${last.pct>=80?'var(--ok)':'var(--fail)'}">${last.score}/${last.total} (${last.pct}%)</b> &mdash; ${last.pct>=80?'PASS':'not passed yet'}</p>`;
  h+=`<button class="next-btn" style="margin-top:.8rem" onclick="startExam()">Start / Retake Exam &rarr;</button></div>`;
  main.innerHTML=h;main.scrollTop=0;
}
function startExam(){
  const pool=buildExamPool();
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));const t=pool[i];pool[i]=pool[j];pool[j]=t;}
  examQ=pool.slice(0,Math.min(20,pool.length));examAns={};examResult=null;renderExam(false);
}
function examPick(qi,oi){examAns[qi]=oi;}
function renderExam(graded){
  let h=`<div class="tab-bar"><div class="tab" onclick="showMod(0)">Modules</div><div class="tab active">Final Exam</div></div>`;
  if(graded&&examResult){const pass=examResult.pct>=80;h+=`<div class="exresult ${pass?'pass':'failg'}"><b style="font-size:1.3rem;color:${pass?'var(--ok)':'var(--fail)'}">${pass?'\u2705 PASS':'\u274c Keep studying'}</b> &mdash; you scored <b>${examResult.score}/${examResult.total} (${examResult.pct}%)</b>. ${pass?'Nice work &mdash; solid AET fundamentals!':'Passing is 80%. Review the questions marked incorrect below and retake.'}</div>`;}
  h+=`<div class="mh"><h2>&#127891; Final Exam &mdash; ${examQ.length} questions</h2></div>`;
  examQ.forEach((q,qi)=>{
    const qid='ex'+qi;
    h+=`<div class="qb"><div class="qt">${qi+1}. ${q.q} <span style="font-size:.72rem;color:var(--text2)">[M${q.mod}]</span></div><div class="qo">`;
    q.options.forEach((o,oi)=>{
      let extra='';
      if(graded){if(oi===q.answer)extra=' style="color:var(--ok);font-weight:600"';else if(examAns[qi]===oi)extra=' style="color:var(--fail)"';}
      h+=`<label${extra}><input type="radio" name="${qid}" value="${oi}" ${examAns[qi]===oi?'checked':''} ${graded?'disabled':''} onchange="examPick(${qi},${oi})">${o}</label>`;
    });
    h+=`</div>`;
    if(graded){const ok=examAns[qi]===q.answer;h+=`<div class="qf ${ok?'c':'w'}" style="display:block">${ok?'\u2713 Correct':(examAns[qi]===undefined?'\u2717 No answer':'\u2717 Incorrect')}. ${q.explain}</div>`;}
    h+=`</div>`;
  });
  if(!graded)h+=`<button class="next-btn" onclick="gradeExam()">Submit Exam</button>`;
  else h+=`<button class="next-btn" onclick="startExam()">Retake (new questions) &rarr;</button> <button class="next-btn" style="background:#333;margin-left:.5rem" onclick="showExam()">Exam Home</button>`;
  main.innerHTML=h;main.scrollTop=0;
}
function gradeExam(){
  let score=0;examQ.forEach((q,qi)=>{if(examAns[qi]===q.answer)score++;});
  const total=examQ.length,pct=Math.round(score/total*100);
  examResult={score,total,pct};
  localStorage.setItem('aet_exam',JSON.stringify({score,total,pct,ts:Date.now()}));
  renderExam(true);
}
buildNav();showMod(0);
</script>
</body>
</html>
